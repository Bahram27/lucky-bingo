//  🎵 AUDIO ENGINE

const AU = {
  _ctx: null,
  get ctx() {
    if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)();
    return this._ctx;
  },
  _tone(freq, type, dur, vol, delay = 0) {
    try {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.connect(g); g.connect(this.ctx.destination);
      o.type = type; o.frequency.value = freq;
      const t = this.ctx.currentTime + delay;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur + 0.05);
    } catch (_) {}
  },
  click() { this._tone(1100, "square", 0.04, 0.12); },
  mark()  { this._tone(660, "sine", 0.15, 0.3); this._tone(880, "sine", 0.12, 0.25, 0.1); },
  missed(){ this._tone(220, "sawtooth", 0.2, 0.15); },
  draw()  { this._tone(990, "sine", 0.1, 0.3); this._tone(1320, "sine", 0.12, 0.25, 0.07); },
  bingo() { [523,659,784,1047,1319,1568,2093].forEach((n,i)=>this._tone(n,"sine",0.5,0.3,i*0.09)); },
  lose()  { this._tone(300,"sawtooth",0.3,0.2); this._tone(220,"sawtooth",0.4,0.15,0.3); },
  playBg() {
    try {
      const ctx = this.ctx;
      const m = [[392,.6],[440,.3],[392,.3],[349,.6],[330,.6],[392,.6],[440,.3],[523,.3],[494,1.2],
                  [440,.6],[392,.3],[440,.3],[494,.6],[523,.6],[494,.6],[440,.3],[392,.3],[349,1.2]];
      let t = ctx.currentTime + 0.2;
      m.forEach(([f,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="triangle";o.frequency.value=f;
        g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d*.9);
        o.start(t);o.stop(t+d);t+=d*.5;
      });
    } catch(_){}
  },
};

// ═══════════════════════════════════════════════════════
//  🎲 BINGO LOGIC

function genCard() {
  const card = [];
  for(let c=0;c<5;c++){
    const min=c*15+1,max=(c+1)*15;
    const pool=Array.from({length:max-min+1},(_,i)=>i+min);
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    card.push(pool.slice(0,5));
  }
  card[2][2]=0;
  return card;
}
function flatNums(card){const s=new Set();card.forEach(col=>col.forEach(n=>{if(n!==0)s.add(n);}));return s;}
function checkBingo(marked,card){
  for(let r=0;r<5;r++) if([0,1,2,3,4].every(c=>marked.has(card[c][r]===0?"FREE":card[c][r]))) return true;
  for(let c=0;c<5;c++) if([0,1,2,3,4].every(r=>marked.has(card[c][r]===0?"FREE":card[c][r]))) return true;
  if([0,1,2,3,4].every(i=>marked.has(card[i][i]===0?"FREE":card[i][i]))) return true;
  if([0,1,2,3,4].every(i=>marked.has(card[i][4-i]===0?"FREE":card[i][4-i]))) return true;
  return false;
}
function getWinCells(marked,card){
  const cells=new Set();
  const add=arr=>arr.forEach(k=>cells.add(k));
  for(let r=0;r<5;r++) if([0,1,2,3,4].every(c=>marked.has(card[c][r]===0?"FREE":card[c][r]))) add([0,1,2,3,4].map(c=>`${c}-${r}`));
  for(let c=0;c<5;c++) if([0,1,2,3,4].every(r=>marked.has(card[c][r]===0?"FREE":card[c][r]))) add([0,1,2,3,4].map(r=>`${c}-${r}`));
  if([0,1,2,3,4].every(i=>marked.has(card[i][i]===0?"FREE":card[i][i]))) add([0,1,2,3,4].map(i=>`${i}-${i}`));
  if([0,1,2,3,4].every(i=>marked.has(card[i][4-i]===0?"FREE":card[i][4-i]))) add([0,1,2,3,4].map(i=>`${i}-${4-i}`));
  return cells;
}
function getBallMeta(n){
  if(n<=15)return{col:"B",color:"#FF6B9D"};
  if(n<=30)return{col:"I",color:"#A855F7"};
  if(n<=45)return{col:"N",color:"#3B82F6"};
  if(n<=60)return{col:"G",color:"#10B981"};
  return{col:"O",color:"#F59E0B"};
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function Confetti(){
  const p=Array.from({length:50},(_,i)=>({
    id:i,x:Math.random()*100,
    color:["#FF6B9D","#FFD700","#00F5FF","#A855F7","#10B981","#FF8C00"][i%6],
    size:Math.random()*12+5,delay:Math.random()*.6,dur:Math.random()*1.2+1.5,
    tx:(Math.random()-.5)*400,ty:-(Math.random()*600+200),rot:Math.random()*720,
  }));
  return(
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9999,overflow:"hidden"}}>
      {p.map(p=>(
        <div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:"70%",width:p.size,height:p.size,
          background:p.color,borderRadius:p.id%3===0?"50%":p.id%3===1?"2px":"4px",
          animation:`confetti ${p.dur}s ${p.delay}s ease-out forwards`,
          "--tx":`${p.tx}px`,"--ty":`${p.ty}px`,"--rot":`${p.rot}deg`}}/>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  📋 CARD CELL — FIX #3: yalnız calledNums-da olan kliklenə bilir
// ═══════════════════════════════════════════════════════
function CardCell({val,c,marked,missed,winCell,calledNums,onMark}){
  const isFree=val===0;
  const key=isFree?"FREE":val;
  const isMarked=marked.has(key);
  const isMissed=missed.has(val);
  const isWin=winCell;
  // FIX #3: yalnız calledNums-da olan rəqəmlər kliklenə bilər
  const isCallable=!isFree && !isMarked && !isMissed && calledNums.has(val);
  // Son çəkilən rəqəmdir?
  const isLatest=calledNums.size>0 && val===[...calledNums].at(-1);

  return(
    <button onClick={()=>{if(isCallable){AU.mark();onMark(val);}}}
      style={{
        aspectRatio:"1",borderRadius:8,outline:"none",
        border: isWin?"2px solid #FFD700":isLatest&&!isMarked&&!isMissed?"2px solid rgba(0,245,255,0.6)":"2px solid transparent",
        background: isFree?"linear-gradient(135deg,#FFD700,#FF8C00)"
          :isWin?"linear-gradient(135deg,rgba(255,215,0,0.4),rgba(255,140,0,0.3))"
          :isMarked?`linear-gradient(135deg,${COL_COLORS[c]}cc,${COL_COLORS[c]}88)`
          :isMissed?"rgba(255,60,60,0.12)"
          :isLatest?"rgba(0,245,255,0.08)"
          :"rgba(255,255,255,0.05)",
        cursor:isCallable?"pointer":"default",
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        transition:"all 0.2s cubic-bezier(0.34,1.56,0.64,1)",
        transform:isMarked&&!isFree?"scale(0.9)":isLatest&&!isMarked&&!isMissed?"scale(1.05)":"scale(1)",
        boxShadow:isWin?`0 0 18px rgba(255,215,0,0.6)`:isLatest&&!isMarked&&!isMissed?`0 0 14px rgba(0,245,255,0.35)`:isMarked?`0 0 10px ${COL_COLORS[c]}66`:"none",
        position:"relative",overflow:"hidden",padding:1,
      }}>
      {isFree?(
        <div style={{fontSize:8,fontWeight:900,color:"#fff",fontFamily:"'Bebas Neue',cursive",letterSpacing:.5,textAlign:"center",lineHeight:1.2}}>FREE</div>
      ):isMissed?(
        <><div style={{fontSize:13,fontFamily:"'Bebas Neue',cursive",color:"rgba(255,100,100,0.5)",lineHeight:1}}>{val}</div>
        <div style={{fontSize:16,color:"rgba(255,60,60,0.7)",lineHeight:1,fontWeight:900}}>✕</div></>
      ):(
        <>
          {isMarked&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,opacity:.2,pointerEvents:"none"}}>⭕</div>}
          <div style={{fontSize:14,fontWeight:900,
            color:isMarked||isWin?"#fff":isLatest&&!isMissed?"rgba(0,245,255,0.9)":"rgba(255,255,255,0.75)",
            fontFamily:"'Bebas Neue',cursive",lineHeight:1,
            textShadow:isMarked?"0 0 8px rgba(255,255,255,0.5)":isLatest?"0 0 8px rgba(0,245,255,0.5)":"none",
            position:"relative",zIndex:1}}>{val}</div>
          {isMarked&&<div style={{width:5,height:5,borderRadius:"50%",background:"rgba(255,255,255,0.8)",marginTop:1,position:"relative",zIndex:1}}/>}
        </>
      )}
    </button>
  );
}

            marked={marked} missed={missed} winCell={winCells.has(`${c}-${r}`)}

function TopUpPopup({onClose,onTopUp}){

  const [pan,setPan]=useState("");
  const [exp,setExp]=useState("");
  const [cvv,setCvv]=useState("");

  const formatPan=v=>{
    const d=v.replace(/\D/g,"").slice(0,16);
    return d.replace(/(.{4})/g,"$1 ").trim();
  };
  const formatExp=v=>{
    const d=v.replace(/\D/g,"").slice(0,4);
    if(d.length>=3) return d.slice(0,2)+"/"+d.slice(2);
    return d;
  };

    if(!canPay)return;
    AU.click();setLoading(true);
    setTimeout(()=>{setLoading(false);setDone(true);AU.bingo();
      setTimeout(()=>{onTopUp(amount);onClose();},1500);
    },2000);

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:400,display:"flex",alignItems:"flex-end",animation:"fadeIn .2s ease"}}

        padding:"0 0 34px",animation:"slideUp .35s cubic-bezier(0.34,1.56,0.64,1)",
      }}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 0"}}>
          <div style={{width:40,height:4,borderRadius:2,background:"rgba(255,255,255,0.15)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px 16px"}}>
          <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,color:"#fff",letterSpacing:2}}>💳 BALANs ARTIR</div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,padding:"6px 12px",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:13}}>✕</button>
        </div>

        <div style={{padding:"0 20px"}}>

            <div style={{textAlign:"center",padding:"30px 0"}}>

                {BETS.map(b=>(
                  <button key={b} onClick={()=>{AU.click();setAmount(b);}} style={{
                    padding:"10px 16px",borderRadius:12,border:"none",flexShrink:0,
                    background:amount===b?"linear-gradient(135deg,#FF6B9D,#A855F7)":"rgba(255,255,255,0.07)",
                    border:amount===b?"none":"1px solid rgba(255,255,255,0.1)",

                    cursor:"pointer",boxShadow:amount===b?"0 4px 16px rgba(255,107,157,0.35)":"none",
                  }}>₼{b}</button>
                ))}
                <button onClick={()=>{AU.click();setAmount(20);}} style={{

                  background:amount===20?"linear-gradient(135deg,#FF6B9D,#A855F7)":"rgba(255,255,255,0.07)",

                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:5,letterSpacing:1}}>CVV</div>
                    <input value={cvv} onChange={e=>setCvv(e.target.value.replace(/\D/g,"").slice(0,3))} placeholder="•••" type="password"
                      style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",
                        borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:16,fontFamily:"'Bebas Neue',cursive",
                        letterSpacing:3,outline:"none",caretColor:"#A855F7"}}/>

              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  📝 REGISTER SCREEN — FIX #8
// ═══════════════════════════════════════════════════════
function RegisterScreen({onBack,onRegister}){
  const [form,setForm]=useState({name:"",surname:"",email:"",dob:""});
  const [errors,setErrors]=useState({});
  const [loading,setLoading]=useState(false);

  const validate=()=>{
    const e={};
    if(!form.name.trim()) e.name="Ad daxil edin";
    if(!form.surname.trim()) e.surname="Soyad daxil edin";
    if(!/\S+@\S+\.\S+/.test(form.email)) e.email="Düzgün email daxil edin";
    if(!form.dob) e.dob="Doğum tarixini daxil edin";
    setErrors(e);
    return Object.keys(e).length===0;
  };

  const handleSubmit=()=>{
    if(!validate()) return;
    AU.click(); setLoading(true);
    setTimeout(()=>{ setLoading(false); onRegister(form); },1500);
  };

  const field=(key,label,type="text",ph="")=>(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",letterSpacing:1.5,marginBottom:6,fontFamily:"'Bebas Neue',cursive"}}>{label}</div>
      <input
        type={type} value={form[key]} placeholder={ph}
        onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}
        style={{
          width:"100%",background:"rgba(255,255,255,0.05)",
          border:`1px solid ${errors[key]?"rgba(255,80,80,0.5)":"rgba(255,255,255,0.1)"}`,
          borderRadius:12,padding:"13px 16px",color:"#fff",fontSize:15,outline:"none",
          caretColor:"#A855F7",transition:"border .2s",
          fontFamily:"'DM Sans',sans-serif",
        }}
        onFocus={e=>e.target.style.borderColor="rgba(168,85,247,0.5)"}
        onBlur={e=>e.target.style.borderColor=errors[key]?"rgba(255,80,80,0.5)":"rgba(255,255,255,0.1)"}
      />
      {errors[key]&&<div style={{fontSize:11,color:"#FF6B9D",marginTop:4,letterSpacing:.5}}>{errors[key]}</div>}
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",padding:"14px 16px",
        background:"rgba(5,3,15,0.9)",backdropFilter:"blur(12px)",
        borderBottom:"1px solid rgba(255,255,255,0.06)",position:"sticky",top:0,zIndex:50}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",
          borderRadius:10,padding:"8px 14px",color:"rgba(255,255,255,0.7)",fontSize:13,cursor:"pointer",
          fontFamily:"'Bebas Neue',cursive",letterSpacing:1,marginRight:12}}>← GERİ</button>
        <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,letterSpacing:3,
          background:"linear-gradient(90deg,#FF6B9D,#A855F7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
          QEYDİYYAT
        </div>
      </div>

      <div style={{flex:1,padding:"30px 20px 40px"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:52,marginBottom:8}}>🎱</div>
          <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,color:"#fff",letterSpacing:2}}>HESAB YARAT</div>
          <div style={{color:"rgba(255,255,255,0.35)",fontSize:13,marginTop:4}}>Lucky Bingo-ya xoş gəldiniz!</div>
        </div>

        {field("name","AD","text","Adınızı daxil edin")}
        {field("surname","SOYAD","text","Soyadınızı daxil edin")}
        {field("email","ELEKTRONİK POÇT","email","example@mail.com")}

        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",letterSpacing:1.5,marginBottom:6,fontFamily:"'Bebas Neue',cursive"}}>DOĞUM TARİXİ</div>
          <input type="date" value={form.dob} onChange={e=>setForm(f=>({...f,dob:e.target.value}))}
            style={{width:"100%",background:"rgba(255,255,255,0.05)",
              border:`1px solid ${errors.dob?"rgba(255,80,80,0.5)":"rgba(255,255,255,0.1)"}`,
              borderRadius:12,padding:"13px 16px",color:"#fff",fontSize:15,outline:"none",
              caretColor:"#A855F7",colorScheme:"dark",fontFamily:"'DM Sans',sans-serif"}}
          />
          {errors.dob&&<div style={{fontSize:11,color:"#FF6B9D",marginTop:4}}>{errors.dob}</div>}
        </div>

        <button onClick={handleSubmit} disabled={loading} style={{
          width:"100%",padding:"16px",marginTop:8,borderRadius:14,border:"none",
          background:"linear-gradient(135deg,#FF6B9D,#A855F7,#3B82F6)",
          color:"#fff",fontSize:18,fontFamily:"'Bebas Neue',cursive",letterSpacing:2,
          cursor:"pointer",boxShadow:"0 6px 28px rgba(168,85,247,0.4)",
        }}>
          {loading?"⏳ YARADILIR...":"✅ HESAB YARAT"}
        </button>

        <div style={{textAlign:"center",marginTop:16,color:"rgba(255,255,255,0.25)",fontSize:12}}>
          Qeydiyyatdan keçməklə istifadəçi razılaşmasını qəbul edirsiniz
        </div>
      </div>
    </div>
  );
}

        padding:"0 0 30px",maxHeight:"72vh",display:"flex",flexDirection:"column",
        animation:"slideUp .3s cubic-bezier(0.34,1.56,0.64,1)"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 0"}}>
          <div style={{width:40,height:4,borderRadius:2,background:"rgba(255,255,255,0.15)"}}/>

          <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,padding:"6px 12px",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:13}}>✕ BAĞ</button>
        </div>
        <div style={{overflowY:"auto",padding:"0 16px",flex:1}}>
          {FRIENDS_DATA.map(f=>(
            <div key={f.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px",marginBottom:8,
              background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14}}>
              <div style={{position:"relative"}}>
                <div style={{width:44,height:44,borderRadius:"50%",
                  background:"rgba(168,85,247,0.2)",border:"2px solid rgba(168,85,247,0.3)",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{f.avatar}</div>
                {/* FIX #5: yalnız online nöqtəsi, balans yoxdur */}
                <div style={{position:"absolute",bottom:-1,right:-1,width:12,height:12,borderRadius:"50%",
                  background:f.online?"#10B981":"rgba(255,255,255,0.2)",border:"2px solid #100820"}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:"#fff",fontSize:15}}>{f.name}</div>
                {/* FIX #5: yalnız online/offline */}
                <div style={{fontSize:12,color:f.online?"#10B981":"rgba(255,255,255,0.3)"}}>
                  {f.online?"🟢 Online":"⚫ Offline"}
                </div>
              </div>
              <button disabled={!f.online||invited.has(f.id)} onClick={()=>{AU.click();onInvite(f);}}
                style={{padding:"8px 14px",borderRadius:10,border:"none",
                  background:invited.has(f.id)?"rgba(16,185,129,0.2)":f.online?"linear-gradient(135deg,#A855F7,#3B82F6)":"rgba(255,255,255,0.06)",
                  color:invited.has(f.id)?"#10B981":f.online?"#fff":"rgba(255,255,255,0.25)",
                  fontSize:12,fontFamily:"'Bebas Neue',cursive",letterSpacing:1,
                  cursor:f.online&&!invited.has(f.id)?"pointer":"default"}}>
                {invited.has(f.id)?"✓ GÖNDƏRİLDİ":"➕ DƏVƏT ET"}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  const canAfford = !user || user.balance >= selectedBet;

    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",paddingBottom:20}}>

        {players.map(p=>(

            <div style={{width:48,height:48,borderRadius:"50%",background:"rgba(168,85,247,0.2)",
              border:"2px solid rgba(168,85,247,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{p.avatar}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:"#fff",fontSize:15}}>{p.name}</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.35)"}}>Hazır</div>
            </div>
            <button
              disabled={!canAfford}
              onClick={()=>{AU.click();onJoinGame(selectedBet,[{name:"Siz",avatar:"😎",...(user||{})},p]);}}
              style={{padding:"9px 16px",borderRadius:10,border:"none",
                background:canAfford?"linear-gradient(135deg,#10B981,#059669)":"rgba(255,255,255,0.06)",
                color:canAfford?"#fff":"rgba(255,255,255,0.3)",fontSize:12,fontFamily:"'Bebas Neue',cursive",
                letterSpacing:1,cursor:canAfford?"pointer":"default",
                boxShadow:canAfford?"0 3px 12px rgba(16,185,129,0.35)":"none"}}>
              ▶ OYNA
            </button>
          </div>
        ))}

        {players.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.2)",
            fontFamily:"'Bebas Neue',cursive",fontSize:14,letterSpacing:2}}>
            <div style={{fontSize:38,marginBottom:10}}>😴</div>
            OYUNÇU YOXDUR
          </div>
        )}
      </div>

      {showFriends&&(
        <FriendsPopup
          onClose={()=>setShowFriends(false)}
          onInvite={f=>{ setInvited(prev=>new Set([...prev,f.id])); showToast(`${f.name} dəvət göndərildi! 🎉`); }}
          invited={invited}/>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  🎮 GAME SCREEN
// ═══════════════════════════════════════════════════════
function GameScreen({bet,players,onEnd,user,setUser}){
  const [cards]       = useState(()=>players.map(()=>genCard()));
  const [myMarked,    setMyMarked]   = useState(()=>new Set(["FREE"]));
  const [myMissed,    setMyMissed]   = useState(()=>new Set());
  const [oppMarked,   setOppMarked]  = useState(()=>new Set(["FREE"]));
  const [pool]        = useState(()=>shuffle(Array.from({length:75},(_,i)=>i+1)));
  const [drawn,       setDrawn]      = useState([]);   // newest first
  const [calledNums,  setCalledNums] = useState(new Set()); // FIX #3: all drawn so far
  const [drawIdx,     setDrawIdx]    = useState(0);
  const [myWinCells,  setMyWinCells] = useState(new Set());
  const [oppWinCells, setOppWinCells]= useState(new Set());
  const [winner,      setWinner]     = useState(null);
  const [showResult,  setShowResult] = useState(false);
  // FIX #6: in-game friend invite
  const [showFriends, setShowFriends]= useState(false);
  const [invited,     setInvited]    = useState(new Set());
  const [toast,       setToast]      = useState("");

  const gameEndedRef = useRef(false);
  const missTimers   = useRef({});
  const myCard  = cards[0];
  const oppCard = cards[1];
  const myNums  = useRef(flatNums(myCard)).current;
  const oppNums = useRef(flatNums(oppCard)).current;

  const showToast=(msg)=>{ setToast(msg); setTimeout(()=>setToast(""),2500); };

  const endGame=useCallback((w)=>{
    if(gameEndedRef.current)return;
    gameEndedRef.current=true;
    setWinner(w);
    if(w==="me"){ AU.bingo(); }
    else { AU.lose(); }
    // FIX #4: balance update
    if(setUser){
      setUser(u=>u?({...u, balance: w==="me" ? u.balance+(bet*2*0.9) : u.balance-bet }):u);
    }
    setTimeout(()=>setShowResult(true),700);
  },[bet,setUser]);

  // Draw loop — FIX #1: DRAW_MS = 5000
  useEffect(()=>{
    if(gameEndedRef.current||drawIdx>=pool.length)return;
    const id=setTimeout(()=>{
      const num=pool[drawIdx];
      AU.draw();
      setDrawn(prev=>[num,...prev]);
      setCalledNums(prev=>{ const n=new Set(prev); n.add(num); return n; }); // FIX #3
      setDrawIdx(i=>i+1);

      // Opponent auto-mark
      if(oppNums.has(num)){
        setTimeout(()=>{
          setOppMarked(prev=>{
            const nm=new Set(prev); nm.add(num);
            if(checkBingo(nm,oppCard)){
              setOppWinCells(getWinCells(nm,oppCard));
              endGame("opp");
            }
            return nm;
          });
        },Math.random()*500+100);
      }

      // Miss timer for player — FIX #2: no "klik et" text, just miss timer
      if(myNums.has(num)){
        const tid=setTimeout(()=>{
          setMyMarked(cur=>{
            if(!cur.has(num)){
              setMyMissed(m=>{ const nm=new Set(m); nm.add(num); return nm; });
            }
            return cur;
          });
        },MISS_MS);
        missTimers.current[num]=tid;
      }
    },drawIdx===0?800:DRAW_MS);
    return()=>clearTimeout(id);
  },[drawIdx,pool,myNums,oppNums,oppCard,endGame]);

  useEffect(()=>()=>Object.values(missTimers.current).forEach(clearTimeout),[]);

  const handleMark=(val)=>{
    if(gameEndedRef.current)return;
    // FIX #3: only if val is in calledNums
    if(!calledNums.has(val))return;
    clearTimeout(missTimers.current[val]);
    setMyMarked(prev=>{
      const nm=new Set(prev); nm.add(val);
      if(checkBingo(nm,myCard)){
        setMyWinCells(getWinCells(nm,myCard));
        endGame("me");
      }
      return nm;
    });
  };

  const last5=drawn.slice(0,5);
  const myProg=Math.round((myMarked.size/25)*100);
  const oppProg=Math.round((oppMarked.size/25)*100);
  const latestNum=drawn[0]||null;

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",paddingBottom:16}}>
      {/* TOP BAR */}
      <div style={{padding:"10px 14px",background:"rgba(5,3,15,0.95)",backdropFilter:"blur(12px)",
        borderBottom:"1px solid rgba(255,255,255,0.06)",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{background:"linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,140,0,0.1))",
            border:"1px solid rgba(255,215,0,0.3)",borderRadius:8,padding:"4px 12px",
            fontFamily:"'Bebas Neue',cursive",color:"#FFD700",fontSize:14,letterSpacing:1}}>
            💰 ₼{bet}
          </div>
          {/* FIX #6: in-game friend invite button */}
          <button onClick={()=>{AU.click();setShowFriends(true);}} style={{
            background:"rgba(168,85,247,0.15)",border:"1px solid rgba(168,85,247,0.3)",
            borderRadius:8,padding:"5px 12px",color:"#A855F7",
            fontSize:11,fontFamily:"'Bebas Neue',cursive",letterSpacing:1,cursor:"pointer",
            display:"flex",alignItems:"center",gap:5}}>
            👥 DOST DƏVƏT ET
          </button>
          <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:13,color:"rgba(255,255,255,0.4)",letterSpacing:1}}>
            {drawIdx}/{pool.length}
          </div>
        </div>

        {/* Last 5 balls */}
        <div style={{background:"rgba(0,0,0,0.3)",borderRadius:12,border:"1px solid rgba(255,255,255,0.06)",padding:"8px 10px"}}>
          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:2,fontFamily:"'Bebas Neue',cursive",marginBottom:6}}>
            SON 5 RƏQƏM
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {last5.length===0&&<div style={{color:"rgba(255,255,255,0.15)",fontSize:12,fontFamily:"'Bebas Neue',cursive"}}>Başlıyor...</div>}
            {last5.map((n,i)=>(
              <div key={`${n}-${i}`} style={{animation:i===0?"ballDrop .4s cubic-bezier(0.34,1.56,0.64,1)":"none",opacity:1-i*.14,transform:`scale(${1-i*.04})`}}>
                <MiniBall n={n} size={i===0?46:36}/>
              </div>
            ))}
            {Array.from({length:Math.max(0,5-last5.length)},(_,i)=>(
              <div key={i} style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.03)",border:"1px dashed rgba(255,255,255,0.08)"}}/>
            ))}
          </div>
        </div>
      </div>

      {toast&&(
        <div style={{position:"fixed",top:130,left:"50%",transform:"translateX(-50%)",
          background:"linear-gradient(135deg,#10B981,#059669)",borderRadius:12,padding:"10px 20px",
          color:"#fff",fontFamily:"'Bebas Neue',cursive",fontSize:13,letterSpacing:1,
          zIndex:200,animation:"slideDown .3s ease",boxShadow:"0 4px 20px rgba(16,185,129,0.4)",whiteSpace:"nowrap"}}>{toast}</div>
      )}

      <div style={{padding:"10px 12px",flex:1}}>
        {/* Progress bars */}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {[
            {label:user?user.name:"Siz",avatar:user?.avatar||"😎",prog:myProg,color:"#FFD700"},
            {label:players[1]?.name||"Rəqib",avatar:players[1]?.avatar||"🤖",prog:oppProg,color:"#FF6B9D"},
          ].map((p,i)=>(
            <div key={i} style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${p.color}22`,borderRadius:12,padding:"8px 10px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                <span style={{fontSize:14}}>{p.avatar}</span>
                <span style={{fontWeight:700,color:p.color,fontSize:11,fontFamily:"'Bebas Neue',cursive",letterSpacing:1}}>{p.label}</span>
                <span style={{marginLeft:"auto",fontFamily:"'Bebas Neue',cursive",color:p.color,fontSize:12}}>{p.prog}%</span>
              </div>
              <div style={{height:4,borderRadius:2,background:"rgba(255,255,255,0.08)"}}>
                <div style={{height:"100%",width:`${p.prog}%`,borderRadius:2,background:p.color,transition:"width .5s ease"}}/>
              </div>
            </div>
          ))}
        </div>

        {/* MY CARD */}
        <div style={{marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:16}}>{user?.avatar||"😎"}</span>
            <span style={{fontFamily:"'Bebas Neue',cursive",color:"#FFD700",fontSize:13,letterSpacing:2}}>SİZİN KARTINIZ</span>
            {/* FIX #2: "klik et" yazısı yoxdur */}
          </div>
          <BingoCardUI card={myCard} marked={myMarked} missed={myMissed}
            winCells={myWinCells} calledNums={calledNums} onMark={handleMark}/>
        </div>

        {/* OPP CARD */}
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:14}}>{players[1]?.avatar||"🤖"}</span>
            <span style={{fontFamily:"'Bebas Neue',cursive",color:"#FF6B9D",fontSize:13,letterSpacing:2}}>
              {players[1]?.name||"RƏQİB"}
            </span>
          </div>
          <BingoCardUI card={oppCard} marked={oppMarked} missed={new Set()}
            winCells={oppWinCells} calledNums={new Set()} onMark={()=>{}} mini/>
        </div>
      </div>

      {/* RESULT */}
      {showResult&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:200,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          animation:"fadeIn .3s ease"}}>
          {winner==="me"&&<Confetti/>}
          <div style={{textAlign:"center",padding:"0 30px"}}>
            <div style={{fontSize:80,marginBottom:4,animation:"bigBounce .5s cubic-bezier(0.34,1.56,0.64,1)"}}>
              {winner==="me"?"🏆":"😔"}
            </div>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:winner==="me"?68:46,letterSpacing:winner==="me"?4:2,
              background:winner==="me"?"linear-gradient(135deg,#FFD700,#FF8C00,#FF6B9D)":"linear-gradient(135deg,#666,#444)",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>
              {winner==="me"?"BINGO!":"MƏĞLUB"}
            </div>
            {winner==="me"?(
              <div style={{color:"#FFD700",fontSize:26,fontFamily:"'Bebas Neue',cursive",marginTop:8,letterSpacing:2}}>
                +₼{(bet*2*0.9).toFixed(2)} QAZANDINIZ!
              </div>
            ):(
              <div style={{color:"rgba(255,255,255,0.4)",fontSize:14,marginTop:8,fontFamily:"'Bebas Neue',cursive",letterSpacing:2}}>
                -₼{bet} — {players[1]?.name} qalib oldu
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:12,marginTop:36}}>
            <button onClick={()=>onEnd(false)} style={{padding:"14px 28px",borderRadius:14,
              background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",
              color:"rgba(255,255,255,0.7)",fontSize:16,fontFamily:"'Bebas Neue',cursive",letterSpacing:2,cursor:"pointer"}}>🏠 ÇIX</button>
            <button onClick={()=>onEnd(true)} style={{padding:"14px 28px",borderRadius:14,
              background:"linear-gradient(135deg,#A855F7,#3B82F6)",border:"none",
              color:"#fff",fontSize:16,fontFamily:"'Bebas Neue',cursive",letterSpacing:2,cursor:"pointer",
              boxShadow:"0 6px 24px rgba(168,85,247,0.4)"}}>🔄 YENİDƏN</button>
          </div>
        </div>
      )}

      {/* FIX #6: in-game friends popup */}
      {showFriends&&(
        <FriendsPopup
          onClose={()=>setShowFriends(false)}
          onInvite={f=>{ setInvited(prev=>new Set([...prev,f.id])); showToast(`${f.name} oyuna dəvət edildi! 🎉`); setShowFriends(false); }}
          invited={invited}/>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  🎮 ROOT APP
// ═══════════════════════════════════════════════════════
function App(){
  const [screen,    setScreen]   = useState("home");
  const [user,      setUser]     = useState(null);  // null = qeydiyyatsız
  const [gameParams,setGameParams]= useState(null);
  const [stats,     setStats]    = useState({games:0,wins:0,streak:0});

  const handleRegister=(form)=>{
    setUser({ ...form, balance:10.00, avatar:"😎" });
    setScreen("home");
    setTimeout(()=>AU.playBg(),300);
  };

  const handleTopUp=(amt)=>{
    setUser(u=>u?({...u,balance:u.balance+amt}):u);
  };

  const handleJoinGame=(bet,players)=>{
    AU.click();
    // FIX #4: deduct immediately on entry
    setUser(u=>u?({...u,balance:u.balance-bet}):u);
    setGameParams({bet,players});
    setScreen("game");
  };

  const handleGameEnd=(won,bet)=>{
    // Balance was already adjusted in GameScreen via endGame
    setStats(s=>({
      games:s.games+1,
      wins:s.wins+(won?1:0),
      streak:won?s.streak+1:0,
    }));
    if(won) setScreen("lobby");
    else setScreen("home");
  };

  return(
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#05030F;-webkit-font-smoothing:antialiased;}
        button:active{transform:scale(0.95)!important;}
        input::placeholder{color:rgba(255,255,255,0.2);}
        input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5);}
        @keyframes floatBall{from{transform:translateY(0) rotate(-8deg);}to{transform:translateY(-18px) rotate(8deg);}}
        @keyframes bounceDot{from{transform:translateY(0);}to{transform:translateY(-8px);}}
        @keyframes pulseBtn{0%,100%{box-shadow:0 8px 40px rgba(168,85,247,.5);}50%{box-shadow:0 8px 60px rgba(168,85,247,.8),0 0 40px rgba(255,107,157,.3);}}
        @keyframes ballDrop{0%{transform:translateY(-50px) scale(.5);opacity:0;}70%{transform:translateY(4px) scale(1.06);}100%{transform:translateY(0) scale(1);opacity:1;}}
        @keyframes bigBounce{0%{transform:scale(0) rotate(-10deg);}60%{transform:scale(1.12) rotate(3deg);}100%{transform:scale(1) rotate(0);}}
        @keyframes confetti{0%{transform:translate(0,0) rotate(0);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--rot));opacity:0;}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
        @keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
        ::-webkit-scrollbar{width:3px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:rgba(168,85,247,.4);border-radius:2px;}
      `}</style>

      <div style={{minHeight:"100vh",
        background:"radial-gradient(ellipse at 50% 0%,#1a0533 0%,#05030F 65%)",
        color:"#fff",fontFamily:"'DM Sans',sans-serif",
        maxWidth:430,margin:"0 auto",position:"relative",overflowX:"hidden"}}>
        {/* Grain */}
        <div style={{position:"fixed",inset:0,
          backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E\")",
          pointerEvents:"none",zIndex:0,opacity:0.5}}/>

        <div style={{position:"relative",zIndex:1}}>
          {screen==="home"&&(
            <HomeScreen onPlay={()=>{AU.click();setScreen("lobby");}}
              onRegister={()=>{AU.click();setScreen("register");}}
              stats={stats} user={user} onTopUp={handleTopUp}/>
          )}
          {screen==="register"&&(
            <RegisterScreen onBack={()=>{AU.click();setScreen("home");}} onRegister={handleRegister}/>
          )}
          {screen==="lobby"&&(
            <LobbyScreen onBack={()=>{AU.click();setScreen("home");}}
              onJoinGame={handleJoinGame} user={user}/>
          )}
          {screen==="game"&&gameParams&&(
            <GameScreen bet={gameParams.bet} players={gameParams.players}
              onEnd={(playAgain)=>handleGameEnd(playAgain)}
              user={user} setUser={setUser}/>
          )}
        </div>
      </div>
    </>
  );
}

// Mount app
const { useState, useEffect, useRef, useCallback } = React;
const domNode = document.getElementById('root');
const root = ReactDOM.createRoot(domNode);
root.render(React.createElement(App));
</script>
</body>
</html>
